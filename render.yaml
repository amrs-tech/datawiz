services:
  - type: web
    name: datawiz
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
