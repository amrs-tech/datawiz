services:
  - type: web
    name: datawiz
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
    disk:
      name: datawiz-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
